<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — ChildCare Connect</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #0E4D4A; --teal-soft: #E3EFEA; --teal-mid: #2A9D8F;
    --coral: #E76F51; --coral-soft: #FBE6DE; --coral-dark: #C9543A;
    --cream: #FDFAF5; --ink: #11302E; --body: #4F5D58; --muted: #5C6B66;
    --line: #E8E0D3; --green: #1D9E75; --amber: #EF9F27; --red: #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito Sans', system-ui, sans-serif; background: var(--cream); color: var(--body); line-height: 1.65; min-height: 100vh; }
  h1, h2, h3 { font-family: 'Fraunces', Georgia, serif; color: var(--ink); font-weight: 600; line-height: 1.2; }
  .nav { background: rgba(253,250,245,.95); border-bottom: 1px solid var(--line); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--teal); text-decoration: none; }
  .logo-mark { width: 34px; height: 34px; background: var(--teal); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .logo span { color: var(--coral); }
  .wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px 80px; }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 30px; margin-bottom: 20px; }
  label { display: block; font-size: 13.5px; font-weight: 700; color: var(--ink); margin: 14px 0 5px; }
  input { width: 100%; padding: 11px 14px; border: 1px solid var(--line); border-radius: 10px; font-family: inherit; font-size: 14.5px; color: var(--ink); background: #fff; }
  input:focus { outline: 2px solid var(--teal-mid); border-color: transparent; }
  .btn { width: 100%; margin-top: 20px; padding: 13px; border: none; border-radius: 24px; background: var(--coral); color: #fff; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn:hover { background: var(--coral-dark); }
  .btn:disabled { opacity: .6; cursor: wait; }
  .msg { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; display: none; }
  .msg.err { display: block; background: #FBE9E7; color: var(--red); }
  .msg.ok { display: block; background: var(--teal-soft); color: var(--teal); }
  .topline { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .signout { background: none; border: none; font-family: inherit; font-size: 13.5px; font-weight: 700; color: var(--muted); cursor: pointer; text-decoration: underline; }
  .not-authorized { text-align: center; padding: 40px 20px; color: var(--muted); }

  .plist { display: flex; flex-direction: column; gap: 14px; }
  .prow { border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; }
  .prow .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .prow h3 { font-size: 17px; }
  .prow .type { display: inline-flex; background: var(--teal-soft); color: var(--teal); font-size: 11.5px; font-weight: 700; padding: 3px 10px; border-radius: 11px; margin-top: 4px; }
  .prow .deets { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .prow .deets strong { color: var(--ink); }
  .prow .bio { font-size: 13.5px; margin-top: 8px; }
  .prow .actions { display: flex; gap: 8px; margin-top: 12px; }
  .prow button { padding: 8px 16px; border: none; border-radius: 18px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
  .approve-btn { background: var(--green); color: #fff; }
  .approve-btn:hover { opacity: .9; }
  .revoke-btn { background: #fff; color: var(--red); border: 1px solid #F3C9C4 !important; }
  .revoke-btn:hover { background: #FBE9E7; }
  .status-pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 11px; white-space: nowrap; }
  .status-pill.pending { background: #FEF3E2; color: #9A6A12; }
  .status-pill.live { background: var(--teal-soft); color: var(--teal); }
  .status-pill.rejected { background: #FBE9E7; color: var(--red); }
  .reject-btn { background: #fff; color: var(--red); border: 1px solid #F3C9C4 !important; }
  .reject-btn:hover { background: #FBE9E7; }
  .reopen-btn { background: #fff; color: var(--muted); border: 1px solid var(--line) !important; }
  .reopen-btn:hover { background: var(--cream); }
  .notes-block { margin-top: 10px; padding: 10px 12px; background: #FBE9E7; border-radius: 10px; }
  .notes-block .note-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: var(--red); margin-bottom: 4px; }
  .notes-block .note { font-size: 13px; color: var(--ink); margin-bottom: 4px; }
  .notes-block .note-date { font-size: 11px; color: var(--muted); }
  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 30px 0; }
  .section-label { font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 26px 0 10px; }
  .section-label:first-child { margin-top: 0; }
</style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="index.html">
    <span class="logo-mark" aria-hidden="true">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 20.5C12 20.5 4 15.5 4 9.8 4 6.9 6.2 5 8.6 5c1.5 0 2.7.8 3.4 2 .7-1.2 1.9-2 3.4-2C17.8 5 20 6.9 20 9.8c0 5.7-8 10.7-8 10.7z" fill="#F4A88B"/></svg>
    </span>
    ChildCare&nbsp;<span>Connect</span>
  </a>
  <span style="font-size:13px;font-weight:700;color:var(--muted);">Admin</span>
</nav>

<div class="wrap">

  <!-- ============ AUTH VIEW ============ -->
  <div id="authView">
    <div class="card">
      <h1 style="font-size:24px;margin-bottom:6px;">Admin sign in</h1>
      <p style="font-size:14px;margin-bottom:18px;">Sign in with the designated admin account to review provider listings.</p>
      <label for="authEmail">Email</label>
      <input id="authEmail" type="email" autocomplete="email">
      <label for="authPass">Password</label>
      <input id="authPass" type="password" autocomplete="current-password">
      <button class="btn" id="authBtn" type="button">Sign in</button>
      <div class="msg" id="authMsg"></div>
    </div>
  </div>

  <!-- ============ NOT AUTHORIZED ============ -->
  <div id="notAuthView" style="display:none;">
    <div class="card not-authorized">
      <h2 style="font-size:19px;margin-bottom:8px;">Not authorized</h2>
      <p>This account isn't set up for admin access.</p>
      <button class="signout" id="signOutNA" type="button" style="margin-top:14px;">Sign out</button>
    </div>
  </div>

  <!-- ============ APP VIEW (admin, logged in) ============ -->
  <div id="appView" style="display:none;">
    <div class="topline">
      <h1 style="font-size:22px;">Provider listings</h1>
      <button class="signout" id="signOut" type="button">Sign out</button>
    </div>

    <div class="section-label">Pending review</div>
    <div class="plist" id="pendingList"></div>

    <div class="section-label">Approved &amp; live</div>
    <div class="plist" id="approvedList"></div>

    <div class="section-label">Rejected</div>
    <div class="plist" id="rejectedList"></div>
  </div>

</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const supabase = createClient(
    'https://jcacedyzmsowclexnxvu.supabase.co',
    'sb_publishable_wu3vOGLswNb-8eKJ9MLEOg_mdSaiOHH'
  );

  const ADMIN_EMAIL = 'childcareconnectnc@gmail.com';

  const authView = document.getElementById('authView');
  const notAuthView = document.getElementById('notAuthView');
  const appView = document.getElementById('appView');
  const authBtn = document.getElementById('authBtn');
  const authMsg = document.getElementById('authMsg');

  function show(el, text, kind) {
    el.textContent = text;
    el.className = 'msg ' + kind;
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  authBtn.onclick = async () => {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPass').value;
    if (!email || !password) return show(authMsg, 'Enter your email and password.', 'err');

    authBtn.disabled = true;
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    authBtn.disabled = false;

    if (error) return show(authMsg, error.message, 'err');
    enterApp(data.user);
  };

  const { data: { session } } = await supabase.auth.getSession();
  if (session) enterApp(session.user);

  function bindSignOut(id) {
    document.getElementById(id).onclick = async () => {
      await supabase.auth.signOut();
      location.reload();
    };
  }
  bindSignOut('signOut');
  bindSignOut('signOutNA');

  async function enterApp(user) {
    authView.style.display = 'none';
    if (user.email !== ADMIN_EMAIL) {
      notAuthView.style.display = 'block';
      return;
    }
    appView.style.display = 'block';
    await loadProviders();
  }

  async function loadProviders() {
    const { data: rows, error } = await supabase
      .from('providers')
      .select('*')
      .order('created_at', { ascending: true });

    const pendingList = document.getElementById('pendingList');
    const approvedList = document.getElementById('approvedList');
    const rejectedList = document.getElementById('rejectedList');

    if (error) {
      pendingList.innerHTML = `<p class="empty">Could not load listings: ${escapeHtml(error.message)}</p>`;
      return;
    }

    const { data: notes } = await supabase
      .from('admin_notes')
      .select('*')
      .order('created_at', { ascending: false });

    const notesByProvider = {};
    (notes ?? []).forEach(n => {
      (notesByProvider[n.provider_id] ??= []).push(n);
    });

    const pending = (rows ?? []).filter(p => p.review_status === 'pending');
    const approved = (rows ?? []).filter(p => p.review_status === 'approved');
    const rejected = (rows ?? []).filter(p => p.review_status === 'rejected');

    pendingList.innerHTML = pending.length
      ? pending.map(p => renderRow(p, notesByProvider[p.id])).join('')
      : '<p class="empty">No pending listings right now.</p>';

    approvedList.innerHTML = approved.length
      ? approved.map(p => renderRow(p, notesByProvider[p.id])).join('')
      : '<p class="empty">No approved listings yet.</p>';

    rejectedList.innerHTML = rejected.length
      ? rejected.map(p => renderRow(p, notesByProvider[p.id])).join('')
      : '<p class="empty">No rejected listings.</p>';

    document.querySelectorAll('button[data-approve]').forEach(btn => {
      btn.onclick = () => approveProvider(btn.dataset.approve);
    });
    document.querySelectorAll('button[data-reject]').forEach(btn => {
      btn.onclick = () => rejectProvider(btn.dataset.reject);
    });
    document.querySelectorAll('button[data-reopen]').forEach(btn => {
      btn.onclick = () => reopenProvider(btn.dataset.reopen);
    });
  }

  function renderRow(p, notes) {
    const status = p.review_status;
    const statusLabel = status === 'approved' ? '● Live' : status === 'rejected' ? '● Rejected' : '● Pending';

    let actions = '';
    if (status === 'pending') {
      actions = `<button class="approve-btn" type="button" data-approve="${p.id}">Approve</button>
                 <button class="reject-btn" type="button" data-reject="${p.id}">Reject</button>`;
    } else if (status === 'approved') {
      actions = `<button class="reject-btn" type="button" data-reject="${p.id}">Revoke</button>`;
    } else {
      actions = `<button class="approve-btn" type="button" data-approve="${p.id}">Approve</button>
                 <button class="reopen-btn" type="button" data-reopen="${p.id}">Move to pending</button>`;
    }

    const notesHtml = (status === 'rejected' && notes && notes.length)
      ? `<div class="notes-block">
           <div class="note-label">Admin notes (not visible to provider)</div>
           ${notes.map(n => `<div class="note">${escapeHtml(n.note)}</div><div class="note-date">${new Date(n.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>`).join('')}
         </div>`
      : '';

    return `
      <div class="prow">
        <div class="top">
          <div>
            <h3>${escapeHtml(p.business_name || '(no business name yet)')}</h3>
            <span class="type">${escapeHtml(p.care_type || '—')}</span>
          </div>
          <span class="status-pill ${status}">${statusLabel}</span>
        </div>
        <div class="deets">
          <strong>${escapeHtml(p.city || '—')}</strong>
          ${p.ages_served ? ' · ' + escapeHtml(p.ages_served) : ''}
          ${p.price_range ? ' · ' + escapeHtml(p.price_range) : ''}
        </div>
        <div class="deets">
          ${escapeHtml(p.contact_name || '—')} · <a href="mailto:${escapeHtml(p.email)}" style="color:var(--teal);">${escapeHtml(p.email || '')}</a>${p.phone ? ' · ' + escapeHtml(p.phone) : ''}
        </div>
        ${p.bio ? `<p class="bio">${escapeHtml(p.bio)}</p>` : ''}
        ${notesHtml}
        <div class="actions">${actions}</div>
      </div>`;
  }

  async function approveProvider(id) {
    const { error } = await supabase.from('providers').update({ is_approved: true, review_status: 'approved' }).eq('id', id);
    if (error) return alert('Could not update: ' + error.message);
    loadProviders();
  }

  async function reopenProvider(id) {
    const { error } = await supabase.from('providers').update({ is_approved: false, review_status: 'pending' }).eq('id', id);
    if (error) return alert('Could not update: ' + error.message);
    loadProviders();
  }

  async function rejectProvider(id) {
    const note = prompt("Why are you rejecting/revoking this listing? Optional — only you will ever see this note.");
    const { error } = await supabase.from('providers').update({ is_approved: false, review_status: 'rejected' }).eq('id', id);
    if (error) return alert('Could not update: ' + error.message);
    if (note && note.trim()) {
      await supabase.from('admin_notes').insert({ provider_id: id, note: note.trim() });
    }
    loadProviders();
  }
</script>

</body>
</html>
